name: Show Team Colors

on:
  pull_request:
    branches: [dev, master, main]
    paths:
      - "colors/teams.example.json"
      - "tests/display_team_colors.py"

jobs:
  color-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./requirements.txt
      - name: Test with unittest
        run: |
          export RGBME_SUPPRESS_ADAPTER_LOAD_ERRORS=1
          python ./tests/display_team_colors.py save

      - name: Comment Webpage Screenshot
        uses: opengisch/comment-pr-with-images@upload_only
        with:
          images: "team_colors.png"
          upload_to: imgur
          custom_attachment_msg: "Team colors changed in this PR! Preview:"
          edit_previous_comment: true
          github_token: ${{ secrets.MY_GITHUB_TOKEN }}
