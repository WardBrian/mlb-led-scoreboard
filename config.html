<!doctype html>
<html data-bs-theme="auto">
  <head>
    <meta charset="utf-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jedison@latest/dist/umd/jedison.umd.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col">
          <div class="mt-5" id="jedison-container"></div>
        </div>
        <div class="col">
          <button
            class="btn btn-primary mt-5"
            id="download-btn"
            onclick="onDownload()"
          >
            Download config as .json
          </button>
          <button
            class="btn btn-secondary mt-5"
            id="copy-btn"
            onclick="onCopy()"
          >
            Copy command to clipboard
          </button>
          <textarea
            class="form-control mt-5"
            id="editor-value"
            wrap="off"
            style="
              font-size: 12px;
              font-family: monospace;
              min-height: 200px;
              height: 80%;
            "
          ></textarea>
        </div>
      </div>
    </div>

    <script>
      function componentToHex(c) {
        var hex = c.toString(16);
        return hex.length == 1 ? "0" + hex : hex;
      }

      function rgbToHex({ r, g, b }) {
        return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
      }

      const hex2rgb = (hex) => {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);

        return { r, g, b };
      };

      class EditorColorCustom extends Jedison.Editor {
        static resolves(schema) {
          const schemaType = Jedison.Schema.getSchemaType(schema);
          const custom = Jedison.Schema.getSchemaXOption(schema, "format");
          return schemaType === "object" && custom === "custom-color";
        }

        build() {
          this.control = this.theme.getInputControl({
            type: "color",
            id: this.getIdFromPath(this.instance.path),
          });

          this.control.input.value = rgbToHex(this.instance.getValue());
        }

        addEventListeners() {
          this.control.input.addEventListener("change", (e) => {
            this.instance.setValue(hex2rgb(this.control.input.value));
          });
        }
      }

      const onDownload = () => {
        if (window.latestConfig) {
          const blob = new Blob(
            [JSON.stringify(window.latestConfig, null, 2)],
            { type: "application/json" },
          );
          const a = document.createElement("a");
          const url = URL.createObjectURL(blob);
          a.href = url;
          a.download = "config.json";
          a.click();
          URL.revokeObjectURL(url);
        } else {
          alert("No valid config to download! Please fix errors first.");
        }
      };

      const onCopy = () => {
        if (window.latestConfig) {
          const text = JSON.stringify(window.latestConfig, null, 2);
          const escaped = text.replace(/"/g, '\\"').replace(/\n/g, "\\\\n");
          const cmd = `echo -e "${escaped}" > config.json`;
          navigator.clipboard.writeText(cmd);
        } else {
          alert("No valid config to copy! Please fix errors first.");
        }
      };

      const refParser = new Jedison.RefParser();

      const init = async () => {
        const resp = await fetch("https://raw.githubusercontent.com/MLB-LED-Scoreboard/mlb-led-scoreboard/refs/heads/dev/config.schema.json");
        const schema = await resp.json();

        await refParser.dereference(schema);

        refParser.expandRecursive(schema);

        const jedison = new Jedison.Create({
          container: document.querySelector("#jedison-container"),
          theme: new Jedison.ThemeBootstrap5(),
          iconLib: "bootstrap-icons",
          btnContents: false,
          enableCollapseToggle: true,
          enablePropertiesToggle: true,
          deactivateNonRequired: false,
          customEditors: [EditorColorCustom],
          schema: schema,
        });

        const setValue = () => {
          if (!jedison.getErrors().length) {
            window.latestConfig = jedison.getValue();
            document.querySelector("#editor-value").value = JSON.stringify(
              window.latestConfig,
              null,
              2,
            );
          } else {
            window.latestConfig = null;
            document.querySelector("#editor-value").value =
              "Invalid config! Fix errors to see JSON output.";
          }
        };

        setValue();
        jedison.on("change", (_) => setValue());
      };

      init();
    </script>
  </body>
</html>
